services:
  db:
    image: postgres:18-alpine
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
      - "POSTGRES_USER=sunjinlee"
      - "POSTGRES_DB=vibecomposer_dev"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vibecomposer-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  vibecomposer-local-network:
    name: vibecomposer-local-network
    driver: bridge
